<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Animal – Porto do Engenho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Barlow', sans-serif; background: #fff; color: #1A1A1A; font-size: 12px; line-height: 1.5; }

        .certidao { max-width: 800px; margin: 0 auto; padding: 40px; }

        .cert-header {
            text-align: center; padding-bottom: 20px; margin-bottom: 24px;
            border-bottom: 3px solid #D01B20;
        }
        .cert-header img { height: 80px; padding: 4px; background: #fff; border-radius: 4px; margin-bottom: 8px; }
        .cert-header h1 {
            font-family: 'Barlow Condensed', sans-serif; font-size: 26px; color: #D01B20;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .cert-header p { font-size: 11px; color: #999; margin-top: 4px; }

        .cert-animal {
            text-align: center; padding: 16px; margin-bottom: 20px;
            background: #1A1A1A; color: #fff; border-radius: 6px;
            border-left: 5px solid #D01B20;
        }
        .cert-animal .id { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; letter-spacing: 1px; }
        .cert-animal .badges { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .badge-green { background: #1A7A3F; color: #fff; }
        .badge-red { background: #D01B20; color: #fff; }
        .badge-outline { border: 1px solid #666; color: #ccc; }
        .badge-gray { background: #333; color: #aaa; }

        .cert-section { margin-bottom: 20px; }
        .cert-section h3 {
            font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.5px; color: #D01B20;
            border-bottom: 1px solid #E8E8E8; padding-bottom: 4px; margin-bottom: 10px;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .info-item { padding: 8px 10px; background: #F8F8F8; border-radius: 4px; }
        .info-item .label { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-item .value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
        .info-item.highlight { border-left: 3px solid #D01B20; }
        .info-item.highlight .value { color: #D01B20; font-size: 18px; }

        .gen-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .gen-table td { padding: 8px 12px; border: 1px solid #E8E8E8; text-align: center; }
        .gen-table .role { font-size: 9px; color: #999; text-transform: uppercase; display: block; }
        .gen-table .name { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
        .gen-table .self { background: #1A1A1A; color: #fff; }

        .cert-footer {
            margin-top: 30px; padding-top: 16px;
            border-top: 2px solid #1A1A1A;
            font-size: 9px; color: #999; text-align: center;
        }

        .no-print { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; gap: 8px; }
        .no-print button {
            padding: 10px 20px; border: none; border-radius: 6px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .no-print .btn-back { background: #1A1A1A; color: white; }
        .no-print .btn-print { background: #D01B20; color: white; }

        @media print {
            .no-print { display: none !important; }
            .certidao { padding: 20px; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { size: A4 portrait; margin: 15mm; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <button class="btn-back" onclick="history.back()">Voltar</button>
        <button class="btn-print" onclick="window.print()">Imprimir</button>
    </div>

    <div class="certidao" id="certContent">
        <p style="text-align:center;color:#999;padding:60px">Carregando...</p>
    </div>

    <script>
    const ANIMAL_ENC = '{{ animal_id_enc }}';
    function fmt(v, d) { return v !== null && v !== undefined ? Number(v).toFixed(d || 2) : '-'; }

    document.addEventListener('DOMContentLoaded', async () => {
        const res = await fetch(`/api/animal/${ANIMAL_ENC}`);
        const data = await res.json();
        if (data.erro) {
            document.getElementById('certContent').innerHTML = '<p style="color:#D01B20;text-align:center">Animal nao encontrado.</p>';
            return;
        }

        const m = data.matriz;
        const a = data.avaliacao;
        const isProd = data.is_produto;
        document.title = `Ficha ${m.animal_id} – Porto do Engenho`;

        let badges = '';
        if (isProd) badges += '<span class="badge badge-gray">Produto</span>';
        else badges += '<span class="badge badge-red">' + (m.categoria || 'Matriz') + '</span>';
        if (m.ceip) badges += '<span class="badge badge-green">CEIP</span>';
        if (m.genotipada) badges += '<span class="badge badge-outline">Genomica</span>';
        if (m.precoce) badges += '<span class="badge badge-red">Precoce</span>';
        if (m.tipo_serv) badges += '<span class="badge badge-gray">' + m.tipo_serv + '</span>';
        if (m.sexo) badges += '<span class="badge badge-gray">' + (m.sexo === 'M' ? 'Macho' : 'Femea') + '</span>';

        const categNomes = {'M': 'Multipara', 'N': 'Novilha', 'P': 'Primipara', 'S': 'Secundipara'};

        let ippLabel = '';
        if (m.ipp) {
            if (m.ipp < 24) ippLabel = ' (Super-precoce)';
            else if (m.ipp < 30) ippLabel = ' (Precoce)';
        }

        let html = `
            <div class="cert-header">
                <img src="/static/logo.jpg" alt="Porto do Engenho"><br>
                <h1>Fazenda Porto do Engenho</h1>
                <p>Nelore · Cariacica-ES</p>
            </div>

            <div class="cert-animal">
                <div class="id">${m.animal_id}</div>
                <div class="badges">${badges}</div>
            </div>

            <div class="cert-section">
                <h3>Identificacao</h3>
                <div class="info-grid">
                    <div class="info-item"><div class="label">Nascimento</div><div class="value">${m.data_nasc || '-'}</div></div>
                    <div class="info-item"><div class="label">Idade</div><div class="value">${data.idade || '-'}</div></div>
                    <div class="info-item"><div class="label">Categoria</div><div class="value">${categNomes[m.categoria] || (isProd ? 'Produto' : '-')}</div></div>
                    <div class="info-item"><div class="label">Rodada</div><div class="value">${data.rodada_nome || '-'}</div></div>
                    <div class="info-item"><div class="label">Tipo Servico</div><div class="value">${m.tipo_serv || '-'}</div></div>
                    <div class="info-item"><div class="label">CEIP</div><div class="value">${m.ceip ? 'Sim' : 'Nao'}</div></div>
                </div>
            </div>

            <div class="cert-section">
                <h3>Indices Geneticos</h3>
                <div class="info-grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
                    <div class="info-item highlight"><div class="label">ICIAGen</div><div class="value">${a ? fmt(a.iciagen) : '-'}</div>${a && a.deca_icia_g ? '<div style="font-size:10px;color:#666">Deca ' + a.deca_icia_g + '</div>' : ''}</div>
                    <div class="info-item highlight"><div class="label">IDESM</div><div class="value">${a ? fmt(a.idesm) : '-'}</div>${a && a.deca_idesm_g ? '<div style="font-size:10px;color:#666">Deca ' + a.deca_idesm_g + '</div>' : ''}</div>
                    <div class="info-item highlight"><div class="label">RMat</div><div class="value">${a ? fmt(a.rmat) : '-'}</div></div>
                    <div class="info-item highlight"><div class="label">IFRIG</div><div class="value">${a ? fmt(a.ifrig) : '-'}</div></div>
                </div>
            </div>

            <div class="cert-section">
                <h3>Dados Reprodutivos e Produtivos</h3>
                <div class="info-grid">
                    <div class="info-item"><div class="label">IPP</div><div class="value">${m.ipp ? fmt(m.ipp, 1) + 'm' + ippLabel : '-'}</div></div>
                    <div class="info-item"><div class="label">IEP</div><div class="value">${m.iep ? fmt(m.iep, 1) + 'm' : '-'}</div></div>
                    <div class="info-item"><div class="label">Peso Adulto</div><div class="value">${m.pv ? fmt(m.pv, 0) + ' kg' : '-'}</div></div>
                </div>
            </div>

            <div class="cert-section">
                <h3>Genealogia</h3>
                <table class="gen-table">
                    <tr>
                        <td><span class="role">Avo Paterno</span><span class="name">${m.avo_paterno || '—'}</span></td>
                        <td rowspan="2"><span class="role">Pai (Touro)</span><span class="name">${m.touro_pai || '—'}</span></td>
                        <td rowspan="4" class="self"><span class="role">Animal</span><span class="name" style="font-size:14px">${m.animal_id}</span></td>
                    </tr>
                    <tr><td style="border-bottom:2px solid #ccc"></td></tr>
                    <tr>
                        <td><span class="role">Avo Materno</span><span class="name">${m.avo_materno || '—'}</span></td>
                        <td rowspan="2"><span class="role">Mae</span><span class="name">${m.mae_id || '—'}</span></td>
                    </tr>
                    <tr><td></td></tr>
                </table>
            </div>

            <div class="cert-footer">
                Fazenda Porto do Engenho · Nelore · Cariacica-ES<br>
                Documento gerado em ${new Date().toLocaleDateString('pt-BR')}
            </div>`;

        document.getElementById('certContent').innerHTML = html;
    });
    </script>
</body>
</html>
